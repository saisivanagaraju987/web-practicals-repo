

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape Gallery</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="practical6.css">
</head>
<body>

<div class="container my-5">
  <h2 class="text-center mb-5 fancy-title">🌍 Stunning Landscapes</h2>
  
  <div class="row g-4">
    <!-- Card 1 -->
    <div class="col-md-4">
      <div class="card card-hover h-100">
        <div class="img-container">
          <img src="pexels-liger-pham-232622-1108701.jpg" class="card-img-top" alt="Mount Fuji">
        </div>
        <div class="card-body text-center">
          <h5 class="card-title">Mount Fuji</h5>
          <p class="card-text">
            Twilight view of Mount Fuji framed by autumn leaves and a serene lake.
          </p>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4">
      <div class="card card-hover h-100">
        <div class="img-container">
          <img src="pexels-rohit-bhattarai-79380188-12783894.jpg" class="card-img-top" alt="Snow Mountain">
        </div>
        <div class="card-body text-center">
          <h5 class="card-title">Snow-Capped Mountain</h5>
          <p class="card-text">
            A majestic snowy peak rising above lush greenery and a scenic road.
          </p>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4">
      <div class="card card-hover h-100">
        <div class="img-container">
          <img src="Andaman-Islands.jpg" class="card-img-top" alt="Tropical Beach">
        </div>
        <div class="card-body text-center">
          <h5 class="card-title">Tropical Beach</h5>
          <p class="card-text">
            A paradise beach with turquoise waters, white sand, and lush greenery.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
