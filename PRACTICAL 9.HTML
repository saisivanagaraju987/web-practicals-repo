
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout Page</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #ffe5b4; /* Light Orange */
    }
    .checkout-container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h3, h4 {
      color: #333;
    }
  </style>
</head>
<body>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8 checkout-container">

        <!-- Customer Info -->
      <h3 class="mb-3">Customer Information</h3>
      <form>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" required>
        </div>
      
      <!-- Cart Section -->
      <h4 class="mb-3">Your Cart</h4>
      <ul class="list-group mb-4">
        <li class="list-group-item d-flex justify-content-between">
          <span>Notebook</span><strong>₹120</strong>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Pen Set</span><strong>₹60</strong>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Chocolate Box</span><strong>₹200</strong>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Customized Mug</span><strong>₹150</strong>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Keychain</span><strong>₹50</strong>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Total</span><strong>₹580</strong>
        </li>
      </ul>

        <!-- Payment Method -->
        <h3 class="mt-4 mb-3">Payment Method</h3>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="payment" id="phonepe" required>
          <label class="form-check-label" for="phonepe">PhonePe</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="payment" id="googlepay">
          <label class="form-check-label" for="googlepay">Google Pay</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="payment" id="bhim">
          <label class="form-check-label" for="bhim">BHIM Pay</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-4">Continue To Checkout</button>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
