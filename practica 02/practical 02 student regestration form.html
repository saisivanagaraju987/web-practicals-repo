             <!DOCTYPE html>
<html>
    
    <head>
        <title>Student Registration form</title>
        <h1 align="center">STUDENT REGISTRATION FORM</h1><hr>

    </head>
    <body>
        <form>
            <fieldset>
        <label><b>First Name :</b></label>
        <input type="text" tf="1" placeholder="Enter the first name"><br><br>

        <label><b>Last Name :</b></label>
        <input type="text" tf="2" placeholder="Enter the last name"><br><br>

        <label><b>DOB :</b></label>
        <input type="date"><br><br>

        <label><b>Gender :</b></label>
        <input type="radio" name="Gender" value="Male">Male
        <input type="radio" name="Gender" value="Female">Female
        <input type="radio" name="Gender" value="Others">Others<br><br>

        <label><b>Father Name :</b></label>
        <input type="text" tf="2" placeholder="Enter the Father name"><br><br>

        <label><b>Occupation :</b></label>
        <select>
            <option>--select--</option>
            <option>Farmer</option>
            <option>Bussiness</option>
            <option>Employee</option>
            <option>Sales man</option>
        </select><br><br>

        <label><b>Mother Name :</b></label>
        <input type="text" tf="2" placeholder="Enter the Monther Name"><br><br>

         <label><b>Occupation :</b></label>
        <select>
            <option>--select--</option>
            <option>House Wife</option>
            <option>Farmer</option>
            <option>Business</option>
            <option>Employee</option>
            <option>Salesman</option>
        </select><br><br>

        <label><b>Mobile Number :</b></label>
        <input type="number" placeholder="Enter mobile number"><br><br>

        <label><b>Email :</b></label>
        <input type="email" name="email" placeholder="Enter your email"><br><br>
        
        
        <label><b>Password :</b></label>
         <input type="password" name="password" placeholder="Enter the password"><br><br>

        <label><b>Course :</b></label>
        <select>
            <option>--select--</option>
            <option>Cyber Security</option>
            <option>Aiml</option>
            <option>Aids</option>
            <option>CSE</option>
        </select><br><br>

        <label><b>Upload Your Image:</b></label>
        <input type="file"> <br><br>

        <label><b>Address :</b></label><br>
<textarea cols="30" rows="6" placeholder="Enter your full address"></textarea>
<br><br>

         <input type="submit" value="Registration">
        </fieldset>
      </form>
    </body>
</html>
