
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Listing</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #e8ddc8; /* Light Orange background */
    }
    .card {
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div class="container my-5">
  <h2 class="text-center mb-4">MY PRODUCTS </h2>
  <div class="row">

    <!-- Samsung S25 Phone -->
    <div class="col-md-3 mb-4">
      <div class="card h-100">
        <img src="P10 IMG 1.webp"card-img-top" alt="Samsung S25">
        <div class="card-body text-center">
          <h5 class="card-title">Samsung S25 Phone</h5>
          <p class="card-text">₹79,999</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- MacBook M3 Pro -->
    <div class="col-md-3 mb-4">
      <div class="card h-100">
        <img src="P10 IMG 2.webp" class="card-img-top" alt="MacBook M3 Pro">
        <div class="card-body text-center">
          <h5 class="card-title">MacBook M3 Pro</h5>
          <p class="card-text">₹1,74,900</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- Mechanical Keyboard (Keros) -->
    <div class="col-md-3 mb-4">
      <div class="card h-100">
        <img src="P 10 IMG 3.webp" class="card-img-top" alt="Mechanical Keyboard">
        <div class="card-body text-center">
          <h5 class="card-title">Keros Mechanical Keyboard</h5>
          <p class="card-text">₹1,999</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- JBL Headset -->
    <div class="col-md-3 mb-4">
      <div class="card h-100">
        <img src="P10 IMG 4.webp" class="card-img-top" alt="JBL Headset">
        <div class="card-body text-center">
          <h5 class="card-title">JBL Headset</h5>
          <p class="card-text">₹5,000</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
